name: Build
on: 
  push: 
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      -name: Checkout repository
      uses: actions/checkout@v4

      -name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

      -name: Configure CMake
      run: cmake -B build -S . -G Ninja

      -name: Build
      run: cmake --build build